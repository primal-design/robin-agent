<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Orange background -->
  <rect width="100" height="100" rx="20" fill="#E8722A"/>
  <!-- Ears -->
  <polygon points="15,45 5,10 35,30" fill="#fff"/>
  <polygon points="85,45 95,10 65,30" fill="#fff"/>
  <polygon points="18,42 10,18 32,32" fill="#E8722A"/>
  <polygon points="82,42 90,18 68,32" fill="#E8722A"/>
  <!-- Head -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="#fff"/>
  <!-- Face mask -->
  <ellipse cx="50" cy="62" rx="22" ry="20" fill="#E8722A"/>
  <!-- Eyes -->
  <ellipse cx="37" cy="50" rx="5" ry="5" fill="#E8722A"/>
  <ellipse cx="63" cy="50" rx="5" ry="5" fill="#E8722A"/>
  <ellipse cx="38" cy="50" rx="2.5" ry="2.5" fill="#fff"/>
  <ellipse cx="64" cy="50" rx="2.5" ry="2.5" fill="#fff"/>
  <!-- Eye shine -->
  <circle cx="39" cy="49" r="1" fill="#E8722A"/>
  <circle cx="65" cy="49" r="1" fill="#E8722A"/>
  <!-- Nose -->
  <ellipse cx="50" cy="63" rx="4" ry="3" fill="#fff"/>
  <!-- Mouth -->
  <path d="M46 67 Q50 71 54 67" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
