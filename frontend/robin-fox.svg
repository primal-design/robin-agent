<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" id="robin-fox">
  <style>
    /* ── Base animations ── */
    @keyframes breathe {
      0%,100% { transform: scaleY(1); transform-origin: bottom center; }
      50%      { transform: scaleY(1.03); transform-origin: bottom center; }
    }
    @keyframes blink {
      0%,90%,100% { scaleY: 1; }
      95%          { transform: scaleY(0.05); }
    }
    @keyframes tail-idle {
      0%,100% { transform: rotate(0deg); transform-origin: 20px 72px; }
      50%      { transform: rotate(8deg); transform-origin: 20px 72px; }
    }
    @keyframes tail-wag {
      0%,100% { transform: rotate(0deg);  transform-origin: 20px 72px; }
      20%      { transform: rotate(20deg); transform-origin: 20px 72px; }
      40%      { transform: rotate(-10deg);transform-origin: 20px 72px; }
      60%      { transform: rotate(18deg); transform-origin: 20px 72px; }
      80%      { transform: rotate(-8deg); transform-origin: 20px 72px; }
    }
    @keyframes eye-glow {
      0%,100% { opacity: 0; }
      50%      { opacity: 1; }
    }
    @keyframes ear-perk {
      0%,100% { transform: scaleY(1); transform-origin: bottom center; }
      50%      { transform: scaleY(1.12); transform-origin: bottom center; }
    }

    #fox-body     { animation: breathe 4s ease-in-out infinite; }
    #fox-tail     { animation: tail-idle 3s ease-in-out infinite; }
    #eye-left,
    #eye-right    { animation: blink 5s ease-in-out infinite; }
    #eye-glow-l,
    #eye-glow-r   { opacity: 0; }

    /* state classes toggled by JS */
    .fox-typing #fox-tail      { animation: tail-wag 0.6s ease-in-out infinite; }
    .fox-typing #eye-glow-l,
    .fox-typing #eye-glow-r    { animation: eye-glow 0.8s ease-in-out infinite; }
    .fox-typing #ear-left,
    .fox-typing #ear-right     { animation: ear-perk 0.6s ease-in-out infinite; }

    .fox-reply #fox-tail       { animation: tail-wag 0.4s ease-in-out 3; }
  </style>

  <!-- Tail -->
  <g id="fox-tail">
    <ellipse cx="22" cy="76" rx="14" ry="9" fill="#E8762B" transform="rotate(-30 22 76)"/>
    <ellipse cx="16" cy="80" rx="7" ry="4.5" fill="#F5F0E8" transform="rotate(-30 16 80)"/>
  </g>

  <!-- Body -->
  <g id="fox-body">
    <!-- Main body -->
    <ellipse cx="50" cy="68" rx="22" ry="18" fill="#E8762B"/>
    <!-- Chest patch -->
    <ellipse cx="50" cy="72" rx="12" ry="11" fill="#F5F0E8"/>
    <!-- Legs -->
    <rect x="36" y="80" width="8" height="10" rx="4" fill="#C85A1A"/>
    <rect x="56" y="80" width="8" height="10" rx="4" fill="#C85A1A"/>
    <!-- Paws -->
    <ellipse cx="40" cy="90" rx="5" ry="3" fill="#1A1816"/>
    <ellipse cx="60" cy="90" rx="5" ry="3" fill="#1A1816"/>
  </g>

  <!-- Ears -->
  <g id="ear-left">
    <polygon points="32,46 26,28 42,38" fill="#E8762B"/>
    <polygon points="33,44 29,32 40,39" fill="#C85A1A"/>
  </g>
  <g id="ear-right">
    <polygon points="68,46 74,28 58,38" fill="#E8762B"/>
    <polygon points="67,44 71,32 60,39" fill="#C85A1A"/>
  </g>

  <!-- Head -->
  <ellipse cx="50" cy="50" rx="20" ry="18" fill="#E8762B"/>

  <!-- Face mask -->
  <ellipse cx="50" cy="55" rx="13" ry="10" fill="#F5F0E8"/>

  <!-- Eyes -->
  <g id="eye-left">
    <ellipse cx="42" cy="47" rx="4" ry="4.5" fill="#1A1816"/>
    <ellipse cx="43.5" cy="45.5" rx="1.2" ry="1.2" fill="#fff"/>
  </g>
  <g id="eye-right">
    <ellipse cx="58" cy="47" rx="4" ry="4.5" fill="#1A1816"/>
    <ellipse cx="59.5" cy="45.5" rx="1.2" ry="1.2" fill="#fff"/>
  </g>

  <!-- Eye glow (typing state) -->
  <ellipse id="eye-glow-l" cx="42" cy="47" rx="5" ry="5.5" fill="none" stroke="#B8976B" stroke-width="1.5"/>
  <ellipse id="eye-glow-r" cx="58" cy="47" rx="5" ry="5.5" fill="none" stroke="#B8976B" stroke-width="1.5"/>

  <!-- Nose -->
  <ellipse cx="50" cy="55" rx="3" ry="2" fill="#1A1816"/>

  <!-- Mouth -->
  <path d="M46 58 Q50 62 54 58" fill="none" stroke="#1A1816" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="37" y1="55" x2="46" y2="56" stroke="#1A1816" stroke-width="0.7" opacity="0.5"/>
  <line x1="37" y1="58" x2="46" y2="58" stroke="#1A1816" stroke-width="0.7" opacity="0.5"/>
  <line x1="54" y1="56" x2="63" y2="55" stroke="#1A1816" stroke-width="0.7" opacity="0.5"/>
  <line x1="54" y1="58" x2="63" y2="58" stroke="#1A1816" stroke-width="0.7" opacity="0.5"/>
</svg>
